<!DOCTYPE html>
<html lang="pl">
<head>
  <base target="_top">
  <style>
    :root{--brand:#8b1e3f;--dark:#68152e;--bg:#f7f3f1;--card:#fff;--line:#ded6d2;--ok:#217346;--bad:#b42318;--muted:#70666a}
    *{box-sizing:border-box}body{margin:0;background:var(--bg);color:#251f21;font-family:Arial,sans-serif}.app{max-width:760px;margin:auto;padding:calc(14px + env(safe-area-inset-top)) 14px calc(90px + env(safe-area-inset-bottom))}
    header{display:flex;align-items:center;gap:12px;margin-bottom:14px}.logo{font-size:44px}h1{font-size:24px;margin:0}.sub{color:var(--muted);font-size:13px;margin-top:3px}.panel,.item{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:14px;margin-bottom:12px;box-shadow:0 3px 12px rgba(35,20,25,.06)}
    textarea{width:100%;min-height:180px;border:1px solid var(--line);border-radius:12px;padding:13px;font:16px/1.45 Arial;resize:vertical}button{border:0;border-radius:11px;padding:12px 14px;font-weight:700;font-size:15px}.primary{background:var(--brand);color:#fff}.secondary{background:#eee8e6;color:#33282c}.danger{background:#fde8e6;color:var(--bad)}
    .actions{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px}.actions button{flex:1;min-width:125px}.recording{background:#b42318!important;color:#fff!important;animation:pulse 1.2s infinite}.status{display:none;padding:11px;border-radius:10px;margin-top:10px}.status.show{display:block}.status.ok{background:#e7f4eb;color:var(--ok)}.status.bad{background:#fde9e7;color:var(--bad)}@keyframes pulse{50%{opacity:.72}}
    .summary{display:flex;gap:8px;flex-wrap:wrap;margin:12px 0}.pill{background:#fff;border:1px solid var(--line);border-radius:999px;padding:7px 10px;font-size:13px}.item.excluded{opacity:.52}.item-head{display:flex;align-items:flex-start;justify-content:space-between;gap:10px}.source{font-weight:700;line-height:1.3}.check{display:flex;gap:7px;align-items:center;font-size:14px}
    .grid{display:grid;grid-template-columns:1fr 120px;gap:10px;margin-top:12px}.field{display:flex;flex-direction:column;gap:5px}.field.full{grid-column:1/-1}label{font-size:12px;color:var(--muted);font-weight:700}input,select{width:100%;min-height:44px;border:1px solid var(--line);border-radius:10px;padding:9px;background:#fff;font-size:16px}
    .item-footer{display:flex;justify-content:space-between;align-items:center;gap:8px;margin-top:12px}.badge{font-size:12px;font-weight:800;padding:6px 8px;border-radius:999px}.badge.ok{background:#e7f4eb;color:var(--ok)}.badge.bad{background:#fde9e7;color:var(--bad)}.sticky{position:fixed;left:0;right:0;bottom:0;padding:10px 14px calc(10px + env(safe-area-inset-bottom));background:rgba(247,243,241,.95);backdrop-filter:blur(8px);border-top:1px solid var(--line)}.sticky button{display:block;width:min(732px,100%);margin:auto;min-height:52px}.empty{text-align:center;color:var(--muted);padding:28px 10px}.hint{font-size:12px;color:var(--muted);line-height:1.4;margin:8px 0 0}@media(max-width:480px){.grid{grid-template-columns:1fr}.field.full{grid-column:auto}.app{padding-left:10px;padding-right:10px}.panel,.item{border-radius:13px;padding:12px}}
  </style>
</head>
<body>
<main class="app"><header><div class="logo">🍕</div><div><h1>Inventory PRO</h1><div class="sub" id="appMeta">Uruchamianie wersji mobilnej…</div></div></header><section class="panel"><textarea id="source" placeholder="Nagraj, podyktuj lub wklej inwenturę. Każdy produkt może być w osobnym wierszu."></textarea><p class="hint">Nagrywanie Gemini przepisuje mowę po zakończeniu nagrania. Maksymalna długość jednej próbki: 3 minuty. Przed analizą możesz poprawić transkrypt.</p><div class="actions"><button id="aiRecordButton" class="primary" onclick="toggleAiRecording()">🎙 Nagraj z Gemini</button><button id="dictateButton" class="secondary" onclick="startDictation()">⌨️ Dyktuj klawiaturą</button><button class="secondary" onclick="clearDraft()">Wyczyść tekst</button><button class="primary" onclick="analyze()">Analizuj</button></div><div id="message" class="status"></div></section><div id="summary" class="summary"></div><section id="items"><div class="empty">Najpierw utwórz transkrypt i wybierz „Analizuj”.</div></section><datalist id="products"></datalist></main><div class="sticky"><button id="save" class="primary" onclick="save()" disabled>Zapisz zaznaczone pozycje</button></div>
<script>
let boot={products:[],locations:[],location:{name:''}},items=[],recognition=null,audioRecorder=null;const $=id=>document.getElementById(id);const esc=s=>String(s??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));const server=(name,...args)=>new Promise((resolve,reject)=>google.script.run.withSuccessHandler(resolve).withFailureHandler(reject)[name](...args));function show(text,type='ok'){const el=$('message');el.textContent=text;el.className='status show '+type}function err(e){show(e&&e.message?e.message:String(e||'Wystąpił błąd.'),'bad')}function draftKey(){return'inventory-pro-mobile-'+(boot.location.id||'local')}
function isIos_(){return /iPad|iPhone|iPod/.test(navigator.userAgent)||(navigator.platform==='MacIntel'&&navigator.maxTouchPoints>1)}async function init(){try{boot=await server('getMobileBootstrap');$('appMeta').textContent=boot.location.name+' · '+boot.version;$('products').innerHTML=boot.products.map(p=>'<option value="'+esc(p.name)+'"></option>').join('');const draft=localStorage.getItem(draftKey());if(draft)$('source').value=draft;if(!navigator.mediaDevices||!navigator.mediaDevices.getUserMedia){$('aiRecordButton').disabled=true;$('aiRecordButton').textContent='Brak obsługi mikrofonu'}}catch(e){err(e)}}$('source').addEventListener('input',()=>{if(boot.location.id)localStorage.setItem(draftKey(),$('source').value)});function clearDraft(){if(audioRecorder)return show('Najpierw zatrzymaj nagrywanie.','bad');if(!confirm('Usunąć zapisany transkrypt?'))return;$('source').value='';localStorage.removeItem(draftKey());show('Wyczyszczono transkrypt.')}
async function toggleAiRecording(){if(audioRecorder){await stopAiRecording_();return}try{show('Sprawdzam konfigurację Gemini…');const availability=await server('getGeminiTranscriptionAvailability');if(!availability||!availability.configured)return show('Klucz Gemini nie jest dostępny w tym wdrożeniu. Uruchom ponownie konfigurację w arkuszu po instalacji wersji 4.5.2.','bad');const stream=await navigator.mediaDevices.getUserMedia({audio:{channelCount:1,echoCancellation:true,noiseSuppression:true,autoGainControl:true}});const AudioCtx=window.AudioContext||window.webkitAudioContext;const context=new AudioCtx();await context.resume();const source=context.createMediaStreamSource(stream);const processor=context.createScriptProcessor(4096,1,1);const silent=context.createGain();silent.gain.value=0;const chunks=[];processor.onaudioprocess=e=>chunks.push(new Float32Array(e.inputBuffer.getChannelData(0)));source.connect(processor);processor.connect(silent);silent.connect(context.destination);audioRecorder={stream,context,source,processor,silent,chunks,started:Date.now(),timer:null,limitTimer:null};audioRecorder.timer=setInterval(updateRecordingUi_,1000);audioRecorder.limitTimer=setTimeout(()=>stopAiRecording_(true),(boot.maxRecordingSeconds||180)*1000);$('aiRecordButton').classList.add('recording');updateRecordingUi_();show('Nagrywanie rozpoczęte. Wypowiadaj produkt i wartość, następnie zatrzymaj nagranie.')}catch(e){audioRecorder=null;err(e&&e.name==='NotAllowedError'?'Brak dostępu do mikrofonu. Zezwól przeglądarce na użycie mikrofonu.':e)}}function updateRecordingUi_(){if(!audioRecorder)return;const seconds=Math.floor((Date.now()-audioRecorder.started)/1000);$('aiRecordButton').textContent='⏹ Zatrzymaj · '+Math.floor(seconds/60)+':'+String(seconds%60).padStart(2,'0')}async function stopAiRecording_(automatic=false){const rec=audioRecorder;if(!rec)return;audioRecorder=null;clearInterval(rec.timer);clearTimeout(rec.limitTimer);rec.processor.disconnect();rec.source.disconnect();rec.silent.disconnect();rec.stream.getTracks().forEach(t=>t.stop());await rec.context.close();$('aiRecordButton').classList.remove('recording');$('aiRecordButton').disabled=true;$('aiRecordButton').textContent='Przetwarzanie nagrania…';const duration=Math.max(1,(Date.now()-rec.started)/1000);try{show((automatic?'Osiągnięto limit 3 minut. ':'')+'Gemini przygotowuje transkrypt…');const wav=encodeWav_(rec.chunks,rec.context.sampleRate,16000);const result=await server('transcribeInventoryAudio',bytesToBase64_(wav),'audio/wav',duration);const field=$('source');field.value+=(field.value.trim()? '\n':'')+result.transcript.trim();localStorage.setItem(draftKey(),field.value);show('Transkrypt Gemini jest gotowy. Sprawdź tekst i wybierz „Analizuj”.')}catch(e){err(e)}finally{$('aiRecordButton').disabled=false;$('aiRecordButton').textContent='🎙 Nagraj z Gemini'}}function encodeWav_(chunks,inputRate,outputRate){let length=chunks.reduce((n,c)=>n+c.length,0),merged=new Float32Array(length),offset=0;chunks.forEach(c=>{merged.set(c,offset);offset+=c.length});const ratio=inputRate/outputRate,outLength=Math.max(1,Math.round(merged.length/ratio)),samples=new Float32Array(outLength);for(let i=0;i<outLength;i++){const start=Math.floor(i*ratio),end=Math.min(merged.length,Math.floor((i+1)*ratio));let sum=0,count=0;for(let j=start;j<end;j++){sum+=merged[j];count++}samples[i]=count?sum/count:merged[start]||0}const buffer=new ArrayBuffer(44+samples.length*2),view=new DataView(buffer);const write=(p,s)=>{for(let i=0;i<s.length;i++)view.setUint8(p+i,s.charCodeAt(i))};write(0,'RIFF');view.setUint32(4,36+samples.length*2,true);write(8,'WAVE');write(12,'fmt ');view.setUint32(16,16,true);view.setUint16(20,1,true);view.setUint16(22,1,true);view.setUint32(24,outputRate,true);view.setUint32(28,outputRate*2,true);view.setUint16(32,2,true);view.setUint16(34,16,true);write(36,'data');view.setUint32(40,samples.length*2,true);for(let i=0;i<samples.length;i++){const s=Math.max(-1,Math.min(1,samples[i]));view.setInt16(44+i*2,s<0?s*32768:s*32767,true)}return new Uint8Array(buffer)}function bytesToBase64_(bytes){let binary='';const size=32768;for(let i=0;i<bytes.length;i+=size)binary+=String.fromCharCode.apply(null,bytes.subarray(i,Math.min(i+size,bytes.length)));return btoa(binary)}
function useKeyboardDictation_(){const field=$('source');field.focus();field.setSelectionRange(field.value.length,field.value.length);show('Pole jest gotowe. Dotknij mikrofonu na klawiaturze iPhone’a i zacznij mówić.')}function startDictation(){if(isIos_()){useKeyboardDictation_();return}const SR=window.SpeechRecognition||window.webkitSpeechRecognition;if(!SR){useKeyboardDictation_();return}if(recognition){recognition.stop();recognition=null;show('Zatrzymano dyktowanie.');return}recognition=new SR();recognition.lang='pl-PL';recognition.continuous=true;recognition.interimResults=false;recognition.onresult=e=>{for(let i=e.resultIndex;i<e.results.length;i++)if(e.results[i].isFinal)$('source').value+=($('source').value.trim()?'\n':'')+e.results[i][0].transcript.trim();localStorage.setItem(draftKey(),$('source').value)};recognition.onerror=e=>{recognition=null;if(e.error==='not-allowed'||e.error==='service-not-allowed'){useKeyboardDictation_();return}err('Dyktowanie: '+e.error)};recognition.onend=()=>{recognition=null};recognition.start();show('Dyktowanie aktywne. Dotknij ponownie, aby zatrzymać.')}
async function analyze(){const text=$('source').value.trim();if(!text)return show('Najpierw wpisz lub podyktuj tekst.','bad');show('Analizuję transkrypt…');$('save').disabled=true;try{const result=await server('analyzeImportText',text);items=result.items||[];render();show('Analiza zakończona. Sprawdź zaznaczone pozycje.')}catch(e){err(e)}}function issue(x){if(!x||!x.include)return false;return !x.selectedProduct||!Number.isFinite(Number(x.value))||['PARSE_ERROR','NOT_FOUND','ERROR','AMBIGUOUS'].includes(x.status)||x.qualityLevel==='ERROR'||(x.productType==='LOCATION'&&!x.location)}function productMeta(name){return boot.products.find(p=>p.name===name)}function setInclude(i,v){items[i].include=v;if(!v)items[i].learnAlias=false;render()}function removeItem(i){items.splice(i,1);render()}function setValue(i,v){items[i].value=String(v).trim()===''?null:Number(String(v).replace(',','.'));renderSummary()}function setLocation(i,v){items[i].location=v;renderSummary()}function setRemember(i,v){items[i].learnAlias=v}
function setProduct(i,name){const p=productMeta(name);if(!p)return;Object.assign(items[i],{selectedProduct:p.name,productType:p.type,category:p.category,requiresLocation:p.type==='LOCATION',status:'MANUAL',qualityLevel:'OK',manualEdited:true});render()}function productControl(x,i){if(x.selectedProduct)return'<input list="products" value="'+esc(x.selectedProduct)+'" onchange="setProduct('+i+',this.value)">';const options=(x.candidates||[]).map(c=>'<option value="'+esc(c.name)+'">'+esc(c.name)+'</option>').join('');return'<select onchange="setProduct('+i+',this.value)"><option value="">— wybierz produkt —</option>'+options+'</select><input list="products" placeholder="Albo wyszukaj w katalogu" onchange="setProduct('+i+',this.value)">'}function locationControl(x,i){if(!x.requiresLocation)return'<input value="Nie dotyczy" disabled>';return'<select onchange="setLocation('+i+',this.value)"><option value="">— wybierz —</option>'+boot.locations.map(l=>'<option value="'+esc(l.value)+'" '+(x.location===l.value?'selected':'')+'>'+esc(l.label)+'</option>').join('')+'</select>'}
function render(){if(!items.length){$('items').innerHTML='<div class="empty">Brak pozycji.</div>';renderSummary();return}$('items').innerHTML=items.map((x,i)=>'<article class="item '+(!x.include?'excluded':'')+'"><div class="item-head"><div class="source">'+esc(x.originalInput||x.parsedProduct||'Pozycja')+'</div><label class="check"><input type="checkbox" '+(x.include?'checked':'')+' onchange="setInclude('+i+',this.checked)"> Importuj</label></div><div class="grid"><div class="field full"><label>Produkt</label>'+productControl(x,i)+'</div><div class="field"><label>Wartość</label><input inputmode="decimal" value="'+esc(x.value??'')+'" onchange="setValue('+i+',this.value)"></div><div class="field"><label>Lokalizacja</label>'+locationControl(x,i)+'</div><div class="field full"><label class="check"><input type="checkbox" '+(x.learnAlias?'checked':'')+' '+(!x.selectedProduct?'disabled':'')+' onchange="setRemember('+i+',this.checked)"> Zapamiętaj poprawione dopasowanie jako alias</label></div></div><div class="item-footer"><span class="badge '+(issue(x)?'bad':'ok')+'">'+(x.include?(issue(x)?'Wymaga decyzji':'Gotowe'):'Pominięte')+'</span><button class="danger" onclick="removeItem('+i+')">🗑 Usuń</button></div></article>').join('');renderSummary()}function renderSummary(){const included=items.filter(x=>x.include).length,excluded=items.length-included,errors=items.filter(issue).length;$('summary').innerHTML='<span class="pill">Pozycje: <b>'+items.length+'</b></span><span class="pill">Do importu: <b>'+included+'</b></span><span class="pill">Pominięte: <b>'+excluded+'</b></span><span class="pill">Aktywne błędy: <b>'+errors+'</b></span>';$('save').disabled=!included||errors>0}
async function save(){const included=items.filter(x=>x.include).length;if(!included)return show('Nie wybrano żadnej pozycji.','bad');if(items.some(issue))return show('Rozwiąż lub odznacz aktywne błędy.','bad');if(!confirm('Zapisać '+included+' pozycji do '+boot.location.name+'?'))return;show('Zapisuję inwenturę…');$('save').disabled=true;try{const r=await server('saveImportItems',items);show('Zapisano '+r.savedCount+' pozycji. Wykluczono: '+(r.excludedCount||0)+'. Import ID: '+r.importId);items=[];$('source').value='';localStorage.removeItem(draftKey());render()}catch(e){err(e);renderSummary()}}init();
</script></body></html>
