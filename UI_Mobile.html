<!DOCTYPE html>
<html lang="pl">
<head>
  <base target="_top">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <style>
    :root{--brand:#8b1e3f;--dark:#68152e;--bg:#f7f3f1;--card:#fff;--line:#ded6d2;--ok:#217346;--bad:#b42318;--warn:#9a6700;--muted:#70666a}
    *{box-sizing:border-box}html,body{max-width:100%;overflow-x:hidden}body{margin:0;background:var(--bg);color:#251f21;font-family:Arial,sans-serif}.app{width:100%;max-width:760px;margin:auto;padding:calc(14px + env(safe-area-inset-top)) 14px calc(90px + env(safe-area-inset-bottom));overflow-x:hidden}
    header{display:flex;align-items:center;gap:12px;margin-bottom:14px}.logo{font-size:44px}h1{font-size:24px;margin:0}.sub{color:var(--muted);font-size:13px;margin-top:3px}.panel,.item,.job{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:14px;margin-bottom:12px;box-shadow:0 3px 12px rgba(35,20,25,.06)}
    textarea{width:100%;min-height:180px;border:1px solid var(--line);border-radius:12px;padding:13px;font:16px/1.45 Arial;resize:vertical}button{border:0;border-radius:11px;padding:12px 14px;font-weight:700;font-size:15px}.primary{background:var(--brand);color:#fff}.secondary{background:#eee8e6;color:#33282c}.danger{background:#fde8e6;color:var(--bad)}button:disabled{opacity:.55}.actions{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px}.actions button{flex:1;min-width:125px}
    .status{display:none;padding:11px;border-radius:10px;margin-top:10px;white-space:normal;overflow-wrap:anywhere}.status.show{display:block}.status.ok{background:#e7f4eb;color:var(--ok)}.status.bad{background:#fde9e7;color:var(--bad)}.status.warn{background:#fff4d6;color:var(--warn)}.summary{display:flex;gap:8px;flex-wrap:wrap;margin:12px 0}.pill{background:#fff;border:1px solid var(--line);border-radius:999px;padding:7px 10px;font-size:13px}
    .queue-title{font-weight:800;margin:14px 0 8px}.job{padding:11px;display:flex;gap:10px;align-items:center}.job-main{min-width:0;flex:1}.job-name{font-weight:700;overflow-wrap:anywhere}.job-state{font-size:12px;color:var(--muted);margin-top:3px}.job-actions{display:flex;gap:6px}.job-actions button{padding:8px 10px;font-size:12px}
    .item.excluded{opacity:.52}.item-head{display:flex;align-items:flex-start;justify-content:space-between;gap:10px}.source{font-weight:700;line-height:1.3}.check{display:flex;gap:7px;align-items:center;font-size:14px}.grid{display:grid;grid-template-columns:minmax(0,1fr) 120px;gap:10px;margin-top:12px;min-width:0;max-width:100%}.field{display:flex;flex-direction:column;gap:5px;min-width:0;max-width:100%}.field.full{grid-column:1/-1}label{font-size:12px;color:var(--muted);font-weight:700}input,select{display:block;width:100%;max-width:100%;min-width:0;min-height:44px;border:1px solid var(--line);border-radius:10px;padding:9px;background:#fff;font-size:16px}input[type=checkbox]{display:inline-block;width:22px;max-width:22px;min-width:22px;min-height:22px;height:22px;padding:0;flex:0 0 22px}.check,.item,.panel,.item-head,.source{min-width:0;max-width:100%}.check{white-space:normal;overflow-wrap:anywhere}.source{overflow-wrap:anywhere}.item-footer{display:flex;justify-content:space-between;align-items:center;gap:8px;margin-top:12px}.badge{font-size:12px;font-weight:800;padding:6px 8px;border-radius:999px}.badge.ok{background:#e7f4eb;color:var(--ok)}.badge.bad{background:#fde9e7;color:var(--bad)}
    .sticky{position:fixed;left:0;right:0;bottom:0;padding:10px 14px calc(10px + env(safe-area-inset-bottom));background:rgba(247,243,241,.95);backdrop-filter:blur(8px);border-top:1px solid var(--line);z-index:20}.sticky button{display:block;width:min(732px,100%);margin:auto;min-height:52px}.empty{text-align:center;color:var(--muted);padding:28px 10px}.hint{font-size:12px;color:var(--muted);line-height:1.4;margin:8px 0 0}
    .modal-backdrop{position:fixed;inset:0;background:rgba(25,18,21,.52);z-index:100;display:flex;align-items:center;justify-content:center;padding:20px}.modal-backdrop[hidden]{display:none}.modal{width:min(440px,100%);background:#fff;border-radius:20px;padding:20px;box-shadow:0 20px 70px rgba(0,0,0,.25)}.modal h2{margin:0 0 8px;font-size:21px}.modal p{margin:0 0 18px;color:var(--muted);line-height:1.45;white-space:pre-line}.modal-actions{display:flex;gap:8px;justify-content:flex-end}.modal-actions button{flex:1}.modal .cancel{background:#eee8e6;color:#33282c}
    @media(max-width:480px){.grid{grid-template-columns:1fr}.field.full{grid-column:auto}.app{padding-left:10px;padding-right:10px}.panel,.item{border-radius:13px;padding:12px}.modal-actions{flex-direction:column-reverse}}
  </style>
</head>
<body>
<main class="app">
  <header><div class="logo">🍕</div><div><h1>Inventory PRO</h1><div class="sub" id="appMeta">Uruchamianie wersji mobilnej…</div></div></header>
  <section class="panel">
    <textarea id="source" placeholder="Wybierz nagrania z Dyktafonu albo wklej tekst. Każdy produkt może być w osobnym wierszu."></textarea>
    <p class="hint">Możesz wybrać kilka nagrań. Każde może trwać do 10 minut. Nie blokuj telefonu podczas krótkiego etapu przesyłania. Gdy zobaczysz „bezpiecznie zapisano”, transkrypcja może działać po zamknięciu karty.</p>
    <input id="audioFile" type="file" accept="audio/*,.m4a,.mp3,.wav,.aac" multiple hidden onchange="importVoiceMemos(event)">
    <div class="actions"><button id="audioFileButton" class="primary" onclick="document.getElementById('audioFile').click()">🎙 Wybierz nagrania</button><button class="secondary" onclick="startDictation()">⌨️ Dyktuj klawiaturą</button><button class="secondary" onclick="requestClearDraft()">Wyczyść tekst</button><button class="primary" onclick="analyze()">Analizuj</button></div>
    <div id="message" class="status"></div><div id="queue"></div>
  </section>
  <div id="summary" class="summary"></div><section id="items"><div class="empty">Najpierw utwórz transkrypt i wybierz „Analizuj”.</div></section>
</main>
<div class="sticky"><button id="save" class="primary" onclick="requestSave()" disabled>Zapisz zaznaczone pozycje</button></div>
<div id="modalBackdrop" class="modal-backdrop" hidden><div class="modal" role="dialog" aria-modal="true" aria-labelledby="modalTitle"><h2 id="modalTitle"></h2><p id="modalText"></p><div class="modal-actions"><button id="modalCancel" class="cancel">Anuluj</button><button id="modalConfirm" class="primary">Potwierdź</button></div></div></div>
<script>
let boot={products:[],locations:[],location:{name:''}},items=[],jobs=[],recognition=null,pollTimer=null;
const $=id=>document.getElementById(id),esc=s=>String(s??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
const server=(name,...args)=>new Promise((resolve,reject)=>google.script.run.withSuccessHandler(resolve).withFailureHandler(reject)[name](...args));
function show(text,type='ok'){const el=$('message');el.textContent=text;el.className='status show '+type}function err(e){show(e&&e.message?e.message:String(e||'Wystąpił błąd.'),'bad')}
function stateKey(suffix){return'inventory-pro-mobile-'+(boot.location.id||'local')+'-'+suffix}function saveState(){if(!boot.location.id)return;localStorage.setItem(stateKey('draft'),$('source').value);localStorage.setItem(stateKey('items'),JSON.stringify(items));localStorage.setItem(stateKey('jobs'),JSON.stringify(jobs.map(j=>({id:j.id,token:j.token,status:j.status,originalName:j.originalName,durationSeconds:j.durationSeconds,error:j.error||''}))))}
function modal(title,text,confirmText,cancelText='Anuluj'){return new Promise(resolve=>{const back=$('modalBackdrop'),ok=$('modalConfirm'),cancel=$('modalCancel');$('modalTitle').textContent=title;$('modalText').textContent=text;ok.textContent=confirmText;cancel.textContent=cancelText;back.hidden=false;const finish=value=>{back.hidden=true;ok.onclick=null;cancel.onclick=null;resolve(value)};ok.onclick=()=>finish(true);cancel.onclick=()=>finish(false)})}
async function init(){try{boot=await server('getMobileBootstrap');$('appMeta').textContent=boot.location.name+' · '+boot.version;$('source').value=localStorage.getItem(stateKey('draft'))||'';try{items=JSON.parse(localStorage.getItem(stateKey('items'))||'[]')}catch(e){items=[]}try{jobs=JSON.parse(localStorage.getItem(stateKey('jobs'))||'[]')}catch(e){jobs=[]}render();renderQueue();if(jobs.length)pollJobs()}catch(e){err(e)}}
$('source').addEventListener('input',saveState);document.addEventListener('visibilitychange',()=>{if(!document.hidden&&jobs.some(j=>['UPLOADING','QUEUED','PROCESSING'].includes(j.status)))pollJobs(true)});
async function requestClearDraft(){if(!await modal('Usunąć transkrypt?','Usunięty zostanie tekst oraz bieżące wyniki analizy. Nagrania przetwarzane w tle pozostaną w kolejce.','Usuń transkrypt','Zachowaj'))return;$('source').value='';items=[];saveState();render();show('Wyczyszczono transkrypt i wyniki analizy.')}
function uuid(){return crypto&&crypto.randomUUID?crypto.randomUUID():'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g,c=>{const r=Math.random()*16|0;return(c==='x'?r:(r&3|8)).toString(16)})}
async function importVoiceMemos(event){const input=event&&event.target,files=Array.from(input&&input.files||[]);if(!files.length)return;const button=$('audioFileButton');button.disabled=true;try{const availability=await server('getGeminiTranscriptionAvailability');if(!availability||!availability.configured)throw new Error('Klucz Gemini nie jest dostępny w tym wdrożeniu.');for(const file of files)await prepareAndQueueFile(file,availability)}catch(e){err(e)}finally{input.value='';button.disabled=false;button.textContent='🎙 Wybierz nagrania';renderQueue();pollJobs(true)}}
async function prepareAndQueueFile(file,availability){const id=uuid(),token=uuid()+uuid(),job={id,token,status:'UPLOADING',originalName:file.name,durationSeconds:0,error:''};jobs.push(job);saveState();renderQueue();show('Przygotowuję „'+file.name+'”. Nie blokuj teraz telefonu.','warn');if(file.size>120000000)throwJob(job,'Plik źródłowy przekracza 120 MB.');const data=await file.arrayBuffer(),AudioCtx=window.AudioContext||window.webkitAudioContext,context=new AudioCtx(),audio=await context.decodeAudioData(data.slice(0));await context.close();if(!Number.isFinite(audio.duration)||audio.duration<=0||audio.duration>Number(availability.maxSeconds||600))throwJob(job,'Nagranie przekracza limit 10 minut.');job.durationSeconds=audio.duration;const mono=new Float32Array(audio.length);for(let channel=0;channel<audio.numberOfChannels;channel++){const samples=audio.getChannelData(channel);for(let i=0;i<samples.length;i++)mono[i]+=samples[i]/audio.numberOfChannels}const wav=encodeWav_([mono],audio.sampleRate,16000);if(wav.byteLength>Number(availability.maxBytes||20000000))throwJob(job,'Nagranie po przygotowaniu przekracza 20 MB.');show('Przesyłam „'+file.name+'”. Pozostań w aplikacji…','warn');try{const result=await server('queueInventoryAudioJob',bytesToBase64_(wav),'audio/wav',audio.duration,file.name,id,token);Object.assign(job,result);show('Nagranie „'+file.name+'” bezpiecznie zapisano. Możesz zablokować telefon lub zmienić kartę.')}catch(e){job.status='QUEUED';job.error='Sprawdzam, czy serwer zdążył zapisać plik…';show('Połączenie zostało przerwane. Po powrocie sprawdzimy zapisane zadanie.','warn')}saveState();renderQueue()}
function throwJob(job,message){job.status='ERROR';job.error=message;saveState();renderQueue();throw new Error(message)}
function encodeWav_(chunks,inputRate,outputRate){let length=chunks.reduce((n,c)=>n+c.length,0),merged=new Float32Array(length),offset=0;chunks.forEach(c=>{merged.set(c,offset);offset+=c.length});const ratio=inputRate/outputRate,outLength=Math.max(1,Math.round(merged.length/ratio)),samples=new Float32Array(outLength);for(let i=0;i<outLength;i++){const start=Math.floor(i*ratio),end=Math.min(merged.length,Math.floor((i+1)*ratio));let sum=0,count=0;for(let j=start;j<end;j++){sum+=merged[j];count++}samples[i]=count?sum/count:merged[start]||0}const buffer=new ArrayBuffer(44+samples.length*2),view=new DataView(buffer);const write=(p,s)=>{for(let i=0;i<s.length;i++)view.setUint8(p+i,s.charCodeAt(i))};write(0,'RIFF');view.setUint32(4,36+samples.length*2,true);write(8,'WAVE');write(12,'fmt ');view.setUint32(16,16,true);view.setUint16(20,1,true);view.setUint16(22,1,true);view.setUint32(24,outputRate,true);view.setUint32(28,outputRate*2,true);view.setUint16(32,2,true);view.setUint16(34,16,true);write(36,'data');view.setUint32(40,samples.length*2,true);for(let i=0;i<samples.length;i++){const s=Math.max(-1,Math.min(1,samples[i]));view.setInt16(44+i*2,s<0?s*32768:s*32767,true)}return new Uint8Array(buffer)}
function bytesToBase64_(bytes){let binary='';const size=32768;for(let i=0;i<bytes.length;i+=size)binary+=String.fromCharCode.apply(null,bytes.subarray(i,Math.min(i+size,bytes.length)));return btoa(binary)}
async function pollJobs(immediate=false){clearTimeout(pollTimer);const active=jobs.filter(j=>['UPLOADING','QUEUED','PROCESSING'].includes(j.status));if(!active.length)return;const run=async()=>{try{const remote=await server('getInventoryAudioJobs',active.map(j=>({id:j.id,token:j.token})));remote.forEach(r=>{const local=jobs.find(j=>j.id===r.id);if(!local)return;const wasDone=local.status==='DONE';Object.assign(local,r);if(r.status==='DONE'&&!wasDone&&r.transcript){const field=$('source');field.value+=(field.value.trim()?'\n':'')+r.transcript.trim();show('Transkrypt „'+r.originalName+'” jest gotowy.')}if(r.status==='MISSING')local.error='Nie ukończono przesyłania. Wybierz plik ponownie.'});saveState();renderQueue()}catch(e){show('Nie udało się odświeżyć kolejki. Spróbujemy ponownie po powrocie do aplikacji.','warn')}if(jobs.some(j=>['QUEUED','PROCESSING','UPLOADING'].includes(j.status)))pollTimer=setTimeout(run,5000)};if(immediate)run();else pollTimer=setTimeout(run,1000)}
async function retryJob(id){const j=jobs.find(x=>x.id===id);if(!j)return;try{Object.assign(j,await server('retryInventoryAudioJob',j.id,j.token));saveState();renderQueue();pollJobs(true)}catch(e){err(e)}}
async function removeJob(id){const j=jobs.find(x=>x.id===id);if(!j)return;if(!await modal('Usunąć nagranie z kolejki?','Usunięty zostanie tymczasowy plik i wynik transkrypcji. Tekst już dodany do pola pozostanie bez zmian.','Usuń nagranie','Zachowaj'))return;try{await server('dismissInventoryAudioJob',j.id,j.token)}catch(e){}jobs=jobs.filter(x=>x.id!==id);saveState();renderQueue()}
function renderQueue(){if(!jobs.length){$('queue').innerHTML='';return}const labels={UPLOADING:'Przesyłanie — nie blokuj telefonu',QUEUED:'Bezpiecznie zapisano — oczekuje',PROCESSING:'Gemini przepisuje w tle',DONE:'Transkrypcja gotowa',ERROR:'Błąd',MISSING:'Zadanie wygasło'};$('queue').innerHTML='<div class="queue-title">Nagrania</div>'+jobs.map(j=>'<div class="job"><div class="job-main"><div class="job-name">'+esc(j.originalName||'Nagranie')+'</div><div class="job-state">'+esc(labels[j.status]||j.status)+(j.error?' · '+esc(j.error):'')+'</div></div><div class="job-actions">'+(j.status==='ERROR'?'<button class="secondary" onclick="retryJob(\''+j.id+'\')">Ponów</button>':'')+'<button class="danger" onclick="removeJob(\''+j.id+'\')">Usuń</button></div></div>').join('')}
function isIos_(){return /iPad|iPhone|iPod/.test(navigator.userAgent)||(navigator.platform==='MacIntel'&&navigator.maxTouchPoints>1)}function useKeyboardDictation_(){const field=$('source');field.focus();field.setSelectionRange(field.value.length,field.value.length);show('Pole jest gotowe. Dotknij mikrofonu na klawiaturze iPhone’a.')}function startDictation(){if(isIos_()){useKeyboardDictation_();return}const SR=window.SpeechRecognition||window.webkitSpeechRecognition;if(!SR){useKeyboardDictation_();return}if(recognition){recognition.stop();recognition=null;show('Zatrzymano dyktowanie.');return}recognition=new SR();recognition.lang='pl-PL';recognition.continuous=true;recognition.interimResults=false;recognition.onresult=e=>{for(let i=e.resultIndex;i<e.results.length;i++)if(e.results[i].isFinal)$('source').value+=($('source').value.trim()?'\n':'')+e.results[i][0].transcript.trim();saveState()};recognition.onerror=e=>{recognition=null;if(e.error==='not-allowed'||e.error==='service-not-allowed'){useKeyboardDictation_();return}err('Dyktowanie: '+e.error)};recognition.onend=()=>{recognition=null};recognition.start();show('Dyktowanie aktywne. Dotknij ponownie, aby zatrzymać.')}
async function analyze(){const text=$('source').value.trim();if(!text)return show('Najpierw wpisz lub podyktuj tekst.','bad');show('Analizuję transkrypt…');$('save').disabled=true;try{const result=await server('analyzeImportText',text);items=result.items||[];saveState();render();show('Analiza zakończona. Sprawdź zaznaczone pozycje.')}catch(e){err(e)}}
function issue(x){if(!x||!x.include)return false;return !x.selectedProduct||!Number.isFinite(Number(x.value))||['PARSE_ERROR','NOT_FOUND','ERROR','AMBIGUOUS'].includes(x.status)||x.qualityLevel==='ERROR'||(x.productType==='LOCATION'&&!x.location)}function productMeta(name){return boot.products.find(p=>p.name===name)}function setInclude(i,v){items[i].include=v;if(!v)items[i].learnAlias=false;saveState();render()}function removeItem(i){items.splice(i,1);saveState();render()}function setValue(i,v){items[i].value=String(v).trim()===''?null:Number(String(v).replace(',','.'));saveState();renderSummary()}function setLocation(i,v){items[i].location=v;saveState();renderSummary()}function setRemember(i,v){items[i].learnAlias=v;saveState()}
function setProduct(i,name){const p=productMeta(name);if(!p)return;Object.assign(items[i],{selectedProduct:p.name,productType:p.type,category:p.category,requiresLocation:p.type==='LOCATION',status:'MANUAL',qualityLevel:'OK',manualEdited:true,include:true});saveState();render()}function candidateName_(candidate){return candidate&&candidate.name||candidate&&candidate.product&&candidate.product.name||''}function normalizeChoice_(value){return String(value||'').toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/\b(?:sztuk|sztuki|szt|litr|litra|litry|litrow|l)\b/g,' ').replace(/\d+(?:[.,]\d+)?/g,' ').replace(/[^a-z0-9]+/g,' ').trim()}function choiceProducts_(x){const supplied=(x.candidates||[]).map(candidateName_).filter(Boolean),unique=names=>Array.from(new Set(names));if(supplied.length)return unique(supplied);const query=normalizeChoice_(x.parsedProduct||x.originalInput),tokens=query.split(/\s+/).filter(t=>t.length>1);if(tokens.length){const family=boot.products.filter(p=>{const name=normalizeChoice_(p.name);return tokens.every(token=>name.includes(token))}).map(p=>p.name);if(family.length)return unique(family)}return boot.products.map(p=>p.name)}function productControl(x,i){const names=x.selectedProduct?boot.products.map(p=>p.name):choiceProducts_(x);return'<select onchange="setProduct('+i+',this.value)"><option value="">— wybierz produkt ('+names.length+') —</option>'+names.map(name=>'<option value="'+esc(name)+'" '+(name===x.selectedProduct?'selected':'')+'>'+esc(name)+'</option>').join('')+'</select>'}function locationControl(x,i){if(!x.requiresLocation)return'<input value="Nie dotyczy" disabled>';return'<select onchange="setLocation('+i+',this.value)"><option value="">— wybierz —</option>'+boot.locations.map(l=>'<option value="'+esc(l.value)+'" '+(x.location===l.value?'selected':'')+'>'+esc(l.label)+'</option>').join('')+'</select>'}
function render(){if(!items.length){$('items').innerHTML='<div class="empty">Brak pozycji.</div>';renderSummary();return}$('items').innerHTML=items.map((x,i)=>'<article class="item '+(!x.include?'excluded':'')+'"><div class="item-head"><div class="source">'+esc(x.originalInput||x.parsedProduct||'Pozycja')+'</div><label class="check"><input type="checkbox" '+(x.include?'checked':'')+' onchange="setInclude('+i+',this.checked)"> Importuj</label></div><div class="grid"><div class="field full"><label>Produkt</label>'+productControl(x,i)+'</div><div class="field"><label>Wartość</label><input inputmode="decimal" value="'+esc(x.value??'')+'" onchange="setValue('+i+',this.value)"></div><div class="field"><label>Lokalizacja</label>'+locationControl(x,i)+'</div><div class="field full"><label class="check"><input type="checkbox" '+(x.learnAlias?'checked':'')+' '+(!x.selectedProduct?'disabled':'')+' onchange="setRemember('+i+',this.checked)"> Zapamiętaj poprawione dopasowanie jako alias</label></div></div><div class="item-footer"><span class="badge '+(issue(x)?'bad':'ok')+'">'+(x.include?(issue(x)?'Wymaga decyzji':'Gotowe'):'Pominięte')+'</span><button class="danger" onclick="removeItem('+i+')">🗑 Usuń</button></div></article>').join('');renderSummary()}function renderSummary(){const included=items.filter(x=>x.include).length,excluded=items.length-included,errors=items.filter(issue).length;$('summary').innerHTML='<span class="pill">Pozycje: <b>'+items.length+'</b></span><span class="pill">Do importu: <b>'+included+'</b></span><span class="pill">Pominięte: <b>'+excluded+'</b></span><span class="pill">Aktywne błędy: <b>'+errors+'</b></span>';$('save').disabled=!included||errors>0}
async function requestSave(){const included=items.filter(x=>x.include).length;if(!included)return show('Nie wybrano żadnej pozycji.','bad');if(items.some(issue))return show('Rozwiąż lub odznacz aktywne błędy.','bad');if(!await modal('Zapisać inwenturę?','Do '+boot.location.name+' zostanie zapisanych '+included+' pozycji. Pominięte wiersze nie zostaną przesłane.','Zapisz '+included+' pozycji','Wróć do sprawdzania'))return;show('Zapisuję inwenturę…');$('save').disabled=true;try{const r=await server('saveImportItems',items);show('Zapisano '+r.savedCount+' pozycji. Wykluczono: '+(r.excludedCount||0)+'. Import ID: '+r.importId);items=[];$('source').value='';saveState();render()}catch(e){err(e);renderSummary()}}
init();
</script></body></html>
